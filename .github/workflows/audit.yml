name: Audit Sync
on:
  push:
    branches: [ "**" ]

jobs:
  audit_sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Archive for Audit
        run: zip -r audit_package.zip src/ scripts/ results.json -x "*.git*"

      - name: Install Rclone
        run: sudo apt-get install -y rclone

      - name: Setup Rclone and Upload
        env:
          GDRIVE_JSON: ${{ secrets.GDRIVE_CREDENTIALS }}
          FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          # 建立 Rclone 設定檔
          mkdir -p ~/.config/rclone
          echo "[gdrive]
          type = drive
          scope = drive
          service_account_contents = $GDRIVE_JSON" > ~/.config/rclone/rclone.conf
          
          # 上傳至指定資料夾
          rclone copy audit_package.zip gdrive: --drive-root-folder-id "$FOLDER_ID" --drive-use-trash=false
          
          # 在 Google Drive 遠端重命名 (加入分支與 commit id 以防覆蓋)
          rclone move gdrive:audit_package.zip gdrive: --drive-root-folder-id "$FOLDER_ID" \
            --root-drive-id "" --drive-use-trash=false \
            --files-from <(echo "audit_package.zip") \
            --transform "audit_${{ github.ref_name }}_${{ github.sha }}.zip" || true