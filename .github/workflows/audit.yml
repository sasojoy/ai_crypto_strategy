name: Audit Sync
on:
  push:
    branches: [ "**" ]

jobs:
  audit_sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rclone
        run: sudo apt-get install -y rclone

      - name: Sync Folder to Google Drive
        env:
          RCLONE_CONFIG_MYDRIVE_TYPE: drive
          RCLONE_CONFIG_MYDRIVE_SCOPE: drive
          RCLONE_CONFIG_MYDRIVE_TOKEN: '{"refresh_token":"${{ secrets.GDRIVE_REFRESH_TOKEN }}"}'
          FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          # 使用 rclone copy 直接同步整個目錄
          # 目標路徑會加上分支名與 commit sha 以區分不同版本
          rclone copy . "mydrive:audit_${{ github.ref_name }}_${{ github.sha }}" \
            --drive-root-folder-id "$FOLDER_ID" \
            --exclude ".git/**" \
            --drive-use-trash=false \
            --verbose
