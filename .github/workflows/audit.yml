name: Audit Sync
on:
  push:
    branches: [ "**" ]

jobs:
  audit_sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Archive for Audit
        run: zip -r audit_package.zip src/ scripts/ results.json -x "*.git*"

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GDRIVE_CREDENTIALS }}'

      - name: 'Upload to Google Drive'
        uses: 'google-github-actions/upload-cloud-storage@v2'
        # 注意：如果一定要同步到 Google Drive 而非 GCS
        # 且第三方 Action 不穩定，建議改用簡單的 curl 或穩定套件：
        continue-on-error: true
        run: |
          # 這裡推薦改用這個目前最活躍的套件：
          # 或是直接使用此穩定版本
          
      - name: 'Alternative Upload'
        uses: Tofunmi-f/gdrive-upload@v1.0.3
        with:
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          filename: "audit_${{ github.ref_name }}_${{ github.sha }}.zip"
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}