name: Audit Sync
on:
  push:
    branches: [ "**" ]

jobs:
  audit_sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Archive for Audit
        run: zip -r audit_package.zip src/ scripts/ results.json -x "*.git*"

      - name: Install Rclone
        run: sudo apt-get install -y rclone

      - name: Setup Rclone and Upload
        env:
          GDRIVE_JSON: ${{ secrets.GDRIVE_CREDENTIALS }}
          FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          mkdir -p ~/.config/rclone
          # 使用 cat << 'EOF' 確保 JSON 內容中的引號與特殊字元不被 Shell 解析
          cat << 'EOF' > ~/.config/rclone/rclone.conf
          [gdrive]
          type = drive
          scope = drive
          service_account_contents = $GDRIVE_JSON
          EOF
          
          # 將 $GDRIVE_JSON 變數內容正確注入到設定檔中
          # 使用 sed 或直接在 cat 裡處理變數以避開 echo 的限制
          sed -i "s|\$GDRIVE_JSON|$GDRIVE_JSON|g" ~/.config/rclone/rclone.conf
          
          # 執行上傳並重新命名為唯一檔名
          # 直接上傳並指定遠端檔名：rclone copyto [來源] [目標]
          rclone copyto audit_package.zip "gdrive:audit_${{ github.ref_name }}_${{ github.sha }}.zip" \
            --drive-root-folder-id "$FOLDER_ID" \
            --drive-use-trash=false