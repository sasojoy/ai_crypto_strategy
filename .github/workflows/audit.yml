name: Audit Sync
on:
  push:
    branches: [ "**" ]

jobs:
  audit_sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Archive for Audit
        run: zip -r audit_package.zip src/ scripts/ results.json -x "*.git*"

      - name: Install Rclone
        run: sudo apt-get install -y rclone

      - name: Upload to Google Drive
        env:
          GDRIVE_JSON: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER: ${{ secrets.FOLDER_ID }}
        run: |
          # 1. 將密鑰寫入臨時檔案，避開 Shell 解析 JSON 的各種地雷
          echo "$GDRIVE_JSON" > sa.json
          
          # 2. 使用環境變數設定臨時 Remote (名為 gdrive)
          export RCLONE_CONFIG_GDRIVE_TYPE=drive
          export RCLONE_CONFIG_GDRIVE_SCOPE=drive
          export RCLONE_CONFIG_GDRIVE_SERVICE_ACCOUNT_FILE=$(pwd)/sa.json
          
          # 3. 直接上傳並重新命名
          rclone copyto audit_package.zip "gdrive:audit_${{ github.ref_name }}_${{ github.sha }}.zip" \
            --drive-root-folder-id "$GDRIVE_FOLDER" \
            --drive-use-trash=false