name: On-Premise Validation & Deploy
on:
  push:
    branches: [ main ]
jobs:
  doc_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2
      - run: |
          if ! git diff --name-only HEAD^ HEAD | grep -q "CHANGELOG.md"; then
            echo "❌ Error: CHANGELOG.md must be updated!"
            exit 1
          fi

  deploy:
    needs: doc_check
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ~/ai_crypto_strategy
            git fetch --all && git reset --hard origin/main
            
            # 1. 殺死所有 PM2 背景進程
            pm2 delete all || true
            pm2 kill || true
            rm -rf venv
            
            # 2. 重建
            python3.12 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            pip install --no-cache-dir ./wheels/*.whl || echo "No wheels"
            pip install --no-cache-dir -r requirements.txt
            
            # 3. 啟動並鎖定
            pm2 start src/market.py \
              --name "H16_PREDATOR_V133_PRO" \
              --interpreter $(pwd)/venv/bin/python \
              --update-env
            pm2 save
