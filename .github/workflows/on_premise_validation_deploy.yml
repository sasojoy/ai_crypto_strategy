name: v600-DYNAMO-GCE-Deploy

on:
  push:
    branches: [ main ]

jobs:
  # 1. 確保 CHANGELOG 有寫，這對 v600 的追蹤至關重要
  doc_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2
      - name: Check Documentation Updates
        run: |
          if ! git diff --name-only HEAD^ HEAD | grep -q "CHANGELOG.md"; then
            echo "❌ Error: CHANGELOG.md (v600 updates) must be documented!"
            exit 1
          fi

  # 2. 部署到 GCE (使用 Iteration 133.9 級別的環境防禦)
  deploy_v600_to_gce:
    needs: doc_check
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Remote Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/ai_crypto_strategy
            git fetch --all
            git reset --hard origin/main
            
            # 使用妳最穩定的環境重建邏輯
            rm -rf venv
            python3.12 -m venv venv
            source venv/bin/activate
            
            # 離線 Wheels 安裝 + v600 必備庫
            pip install ./wheels/*.whl
            pip install ta ccxt xgboost joblib python-dotenv pandas numpy scikit-learn optuna
            
            # 啟動 v600-DYNAMO (PREDATOR)
            pm2 delete H16_PREDATOR_V133_PRO || true
            pm2 start $(pwd)/src/market.py \
              --name "H16_PREDATOR_V133_PRO" \
              --interpreter $(pwd)/venv/bin/python \
              --cwd $(pwd) \
              --update-env
            pm2 save