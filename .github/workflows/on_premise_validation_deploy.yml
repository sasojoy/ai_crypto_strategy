



name: On-Premise Validation & Deploy

on:
  push:
    branches: [ main ]

jobs:
  doc_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2
      - name: Check Documentation Updates
        run: |
          if ! git diff --name-only HEAD^ HEAD | grep -q "CHANGELOG.md"; then
            echo "❌ Error: CHANGELOG.md must be updated in every push!"
            exit 1
          fi
          VERSION=$(grep "Iteration" CHANGELOG.md | head -n 1 | grep -o "Iteration [0-9.]*" | awk '{print $2}')
          if ! grep -q "Iteration $VERSION" README.md; then
            echo "❌ Error: README.md version ($VERSION) does not match CHANGELOG.md!"
            exit 1
          fi
          echo "✅ Documentation Check Passed!"

  on_premise_validation_deploy:
    needs: doc_check
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Validate on GCE
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Prepare Staging Area
            STAGING_DIR="/home/${{ secrets.SSH_USER }}/staging_area"
            PROD_DIR="/home/${{ secrets.SSH_USER }}/ai_crypto_strategy"
            mkdir -p $STAGING_DIR
            cd $STAGING_DIR
            
            # 2. Fetch latest code to Staging
            if [ ! -d ".git" ]; then
              git clone https://github.com/sasojoy/ai_crypto_strategy.git .
            fi
            git fetch origin main
            git reset --hard origin/main
            
            # 3. Setup Environment in Staging
            chmod +x setup_env.sh
            bash setup_env.sh
            
            # 4. Run Backtest on GCE (On-Premise)
            export PYTHONPATH=$PYTHONPATH:.
            python3 scripts/backtest.py
            
            # 5. Gate Check (WR > 60%, PF > 1.8)
            python3 -c "
            import json, sys
            try:
                with open('results.json') as f:
                    res = json.load(f)
                win_rate = res.get('win_rate', 0)
                wr_val = win_rate * 100 if win_rate < 1 else win_rate
                pf = res.get('profit_factor', 0)
                print(f'\n[GCE Validation] Win Rate: {wr_val}%, Profit Factor: {pf}')
                if wr_val < 60 or pf < 1.8:
                    print('❌ GCE Validation Failed: Gate not met.')
                    sys.exit(1)
                print('✅ GCE Validation Passed!')
            except Exception as e:
                print(f'❌ Error during validation: {e}')
                sys.exit(1)
            "
            
            # 6. Production Sync & Restart (Only if Gate Passed)
            echo "🚀 Syncing to Production..."
            # Ensure $STAGING_DIR/ has a trailing slash to correctly overwrite $PROD_DIR/
            rsync -av --exclude='data/' --exclude='logs/' --exclude='.git/' "${STAGING_DIR}/" "${PROD_DIR}/"
            cd $PROD_DIR
            
            # Iteration 82.1: Robust PM2 Restart Logic
            pm2 delete "Iteration82_Live" || true
            pm2 start src/market.py --name "Iteration82_Live" --update-env
            pm2 save
            
            echo "✅ Deployment Successful!"



