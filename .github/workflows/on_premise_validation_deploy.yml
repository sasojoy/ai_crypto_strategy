name: On-Premise Validation & Deploy

on:
  push:
    branches: [ main ]

jobs:
  doc_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2
      - name: Check Documentation Updates
        run: |
          if ! git diff --name-only HEAD^ HEAD | grep -q "CHANGELOG.md"; then
            echo "❌ Error: CHANGELOG.md must be updated in every push!"
            exit 1
          fi
          VERSION=$(grep "Iteration" CHANGELOG.md | head -n 1 | grep -o "Iteration [0-9.]*" | awk '{print $2}')
          if ! grep -q "Iteration $VERSION" README.md; then
            echo "❌ Error: README.md version ($VERSION) does not match CHANGELOG.md!"
            exit 1
          fi
          echo "✅ Documentation Check Passed!"

  on_premise_validation_deploy:
    needs: doc_check
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Validate on GCE
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/ai_crypto_strategy
            git fetch --all
            git reset --hard origin/main
            git clean -fd
            
            # Iteration 133.2: Physical Mount Setup
            python3 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            # 移除 pip install pandas_ta，改用 src/market.py 的 sys.path 物理掛載
            # 安裝其他基本庫
            pip install ta ccxt xgboost joblib python-dotenv pandas numpy scikit-learn
            
            # PM2 Reset with Venv Interpreter
            pm2 delete all || true
            pm2 start src/market.py --name "H16_PREDATOR_V133" --interpreter ./venv/bin/python
            pm2 save
