name: On-Premise Validation & Deploy

on:
  push:
    branches: [ main ]

jobs:
  doc_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2
      - name: Check Documentation Updates
        run: |
          if ! git diff --name-only HEAD^ HEAD | grep -q "CHANGELOG.md"; then
            echo "❌ Error: CHANGELOG.md must be updated!"
            exit 1
          fi

  on_premise_validation_deploy:
    needs: doc_check
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Robust Deploy on GCE
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ~/ai_crypto_strategy
            git fetch --all && git reset --hard origin/main
            git clean -fd
            
            # 1. 徹底清空 PM2 殭屍與舊環境
            pm2 delete all || true
            pm2 kill || true
            rm -rf venv
            
            # 2. 重建 3.12 環境
            python3.12 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            
            # 3. 依照真理清單安裝
            pip install --no-cache-dir ./wheels/*.whl || echo "No wheels found"
            pip install --no-cache-dir -r requirements.txt
            
            # 4. 使用絕對路徑啟動
            pm2 start $(pwd)/src/market.py \
              --name "H16_PREDATOR_V133_PRO" \
              --interpreter $(pwd)/venv/bin/python \
              --cwd $(pwd) \
              --update-env
            pm2 save
