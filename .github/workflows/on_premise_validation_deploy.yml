name: 🚀 GCE 本地化驗證與部署

on:
  push:
    branches: [ main ]

jobs:
  deploy_and_validate_on_gce:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 遠端 GCE 本地化驗證與部署
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script: |
            cd /home/sasojoy/ai_crypto_strategy
            git fetch origin main
            git checkout origin/main -- scripts/quick_validate.py # 只拿驗證腳本
            
            # 1. 在 GCE 本地環境跑「真數據驗證」
            source venv/bin/activate
            export PYTHONPATH=.
            python3 scripts/quick_validate.py
            
            # 2. 獲取驗證結果 (Exit Code)
            if [ $? -eq 0 ]; then
                echo "✅ 驗證通過，執行生產線更新"
                git pull origin main
                pip install -r requirements.txt
                pm2 startOrReload ecosystem.config.js
                pm2 save
            else
                echo "❌ 驗證失敗：新策略表現不如預期，已拒絕部署！"
                exit 1
            fi