name: On-Premise Validation & Deploy
on:
  push:
    branches: [ main ]
jobs:
  doc_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2
      - run: |
          if ! git diff --name-only HEAD^ HEAD | grep -q "CHANGELOG.md"; then
            echo "❌ Error: CHANGELOG.md must be updated!"
            exit 1
          fi

  deploy:
    needs: doc_check
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ~/ai_crypto_strategy
            git fetch --all && git reset --hard origin/main
            rm -rf venv && find . -name "*.pyc" -delete
            python3.12 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            # 確保安裝 PREDATOR 所有的依賴庫
            pip install --no-cache-dir pandas_ta==0.3.14b0 ta ccxt xgboost joblib python-dotenv pandas numpy scikit-learn optuna requests
            pm2 delete H16_PREDATOR_V133_PRO || true
            pm2 start src/market.py --name "H16_PREDATOR_V133_PRO" --interpreter ./venv/bin/python --update-env
            pm2 save
