name: On-Premise Validation & Deploy
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ~/ai_crypto_strategy
            git fetch --all && git reset --hard origin/main
            
            # 環境重建
            rm -rf venv
            python3.12 -m venv venv
            source venv/bin/activate
            
            # 標準鎖定版本安裝
            pip install --upgrade pip
            pip install --no-cache-dir -r requirements.txt
            
            # 啟動
            pm2 delete H16_PREDATOR_V133_PRO || true
            pm2 start src/market.py --name "H16_PREDATOR_V133_PRO" --interpreter ./venv/bin/python --update-env
            pm2 save
