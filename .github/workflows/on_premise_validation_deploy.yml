name: On-Premise Validation & Deploy
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ~/ai_crypto_strategy
            git fetch --all && git reset --hard origin/main
            
            # 1. 徹底殺掉舊進程與清空日誌
            pm2 delete all || true
            pm2 flush
            rm -rf venv
            
            # 2. 重建環境
            python3.12 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            pip install --no-cache-dir -r requirements.txt
            
            # 3. 核心驗證：如果 certifi 沒裝好，直接中斷不部屬
            python -c "import certifi; print('✅ Certifi Verified:', certifi.where())" || exit 1
            
            # 4. 啟動並鎖定環境
            pm2 start src/market.py \
              --name "H16_PREDATOR_V133_PRO" \
              --interpreter $(pwd)/venv/bin/python \
              --update-env
            pm2 save
