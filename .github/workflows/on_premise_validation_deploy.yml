name: v600-DYNAMO-On-Premise-Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate_strategy:
    runs-on: ubuntu-latest # 或者妳的 On-premise runner 標籤
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install v600 Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install optuna scikit-learn pandas-ta # 確保核心組件到位

      - name: 🧪 Run Logic Unit Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          pytest tests/test_strategy_logic.py # 確保 DYNAMO 矩陣切換邏輯正確

      - name: 📊 Perform OOS Friction Validation (v600.0)
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
        run: |
          # 執行帶有 0.14% 摩擦係數的盲測
          export PYTHONPATH=$PYTHONPATH:.
          python3 strategy/main.py --mode backtest --oos True --friction 0.0014

      - name: 📢 Telegram Audit Report
        if: always() # 確保不論成功失敗都通知妳
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 execution/tele_bot.py --report_audit ./logs/latest_audit.json

  deploy_dry_run:
    needs: validate_strategy
    if: success() # 只有驗證通過（PF > 1.1）才啟動
    runs-on: self-hosted # 妳的實體監控機器
    steps:
      - name: 🚀 Restart Dry Run Service
        run: |
          sudo systemctl restart crypto-dry-run.service