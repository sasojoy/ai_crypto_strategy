name: On-Premise Validation & Deploy

on:
  push:
    branches: [ main ]

jobs:
  # 1. 第一關：文檔與版本一致性檢查 (Joy 的原始強大邏輯)
  doc_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2
      - name: Check Documentation Updates
        run: |
          if ! git diff --name-only HEAD^ HEAD | grep -q "CHANGELOG.md"; then
            echo "❌ Error: CHANGELOG.md must be updated in every push!"
            exit 1
          fi
          VERSION=$(grep "Iteration" CHANGELOG.md | head -n 1 | grep -o "Iteration [0-9.]*" | awk '{print $2}')
          if ! grep -q "Iteration $VERSION" README.md; then
            echo "❌ Error: README.md version ($VERSION) does not match CHANGELOG.md!"
            exit 1
          fi
          echo "✅ Documentation Check Passed!"

  # 2. 第二關：GCE 本地化部署與策略預驗證
  on_premise_validation_deploy:
    needs: doc_check
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Validate on GCE
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}    # 恢復妳原本的 Secret 命名
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/ai_crypto_strategy
            git fetch --all
            git reset --hard origin/main
            git clean -fd
            
            # 環境初始化 (Iteration 133.9 規格)
            rm -rf venv
            python3.12 -m venv venv
            source venv/bin/activate
            
            # 優先安裝本地 Wheels，再補齊雲端庫
            pip install ./wheels/*.whl
            pip install ta ccxt xgboost joblib python-dotenv pandas numpy scikit-learn optuna
            
            # --- [選配] 策略防護層：如果妳有寫好的 quick_validate.py 才執行 ---
            if [ -f "scripts/quick_validate.py" ]; then
              echo "🧪 Running Strategy Validation (OOS Check)..."
              export PYTHONPATH=.
              python3 scripts/quick_validate.py
              if [ $? -ne 0 ]; then
                echo "❌ Strategy Validation Failed! Stopping deployment to protect funds."
                exit 1
              fi
            fi

            # --- PM2 部署 (恢復妳原本的絕對路徑啟動) ---
            pm2 delete H16_PREDATOR_V133_PRO || true
            pm2 start $(pwd)/src/market.py \
              --name "H16_PREDATOR_V133_PRO" \
              --interpreter $(pwd)/venv/bin/python \
              --cwd $(pwd) \
              --update-env
            pm2 save