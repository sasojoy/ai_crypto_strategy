name: On-Premise Validation, Audit & Deploy

on:
  push:
    branches: [ "**" ] 

jobs:
  quality_gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Syntax Check
        run: python3 -m py_compile src/market.py

  audit_sync:
    needs: quality_gate
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Archive for Audit
        run: |
          zip -r audit_package.zip src/ scripts/ results.json -x "*.git*"
      - name: Upload to Google Drive
        uses: aditya611/gdrive-upload@v1.1.0
        with:
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          filename: "audit_${{ github.ref_name }}_${{ github.sha }}.zip"
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          overwrite: "false"

  deploy:
    needs: quality_gate
    if: success() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy to Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/ai_crypto_strategy
            git fetch --all && git reset --hard origin/main
            
            pm2 delete all || true
            pm2 kill || true
            rm -rf venv
            
            python3.12 -m venv venv
            source venv/bin/activate
            pip install --no-cache-dir -r requirements.txt
            
            pm2 flush
            pm2 start src/market.py --name "H16_PREDATOR_PRO" --interpreter ./venv/bin/python
            pm2 save