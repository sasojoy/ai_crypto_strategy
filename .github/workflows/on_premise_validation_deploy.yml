name: On-Premise Validation & Deploy

on:
  push:
    branches: [ main ]

jobs:
  doc_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2
      - name: Check Documentation Updates
        run: |
          if ! git diff --name-only HEAD^ HEAD | grep -q "CHANGELOG.md"; then
            echo "❌ Error: CHANGELOG.md must be updated!"
            exit 1
          fi

  on_premise_validation_deploy:
    needs: doc_check
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Robust Deploy on GCE
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/ai_crypto_strategy
            git fetch --all
            git reset --hard origin/main
            git clean -fd
            
            # 清理快取與舊環境 (解決 AssertionError)
            rm -rf venv
            find . -name "*.pyc" -delete
            find . -name "__pycache__" -delete
            
            # 重建 Python 3.12 環境
            python3.12 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            
            # 強制禁用快取安裝 (防止編譯路徑錯誤)
            pip install --no-cache-dir ./wheels/*.whl || echo "No wheels"
            pip install --no-cache-dir ta ccxt xgboost joblib python-dotenv pandas numpy scikit-learn optuna requests
            
            # PM2 啟動
            pm2 delete H16_PREDATOR_V133_PRO || true
            pm2 start $(pwd)/src/market.py \
              --name "H16_PREDATOR_V133_PRO" \
              --interpreter $(pwd)/venv/bin/python \
              --cwd $(pwd) \
              --update-env
            pm2 save
