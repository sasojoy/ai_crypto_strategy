name: Strategy Backtest

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  doc_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2
      - name: Check Documentation Updates
        run: |
          # Check if CHANGELOG.md was modified in the last commit
          if ! git diff --name-only HEAD^ HEAD | grep -q "CHANGELOG.md"; then
            echo "❌ Error: CHANGELOG.md must be updated in every push!"
            exit 1
          fi
          # Check if README.md contains the current Iteration version
          VERSION=$(grep "Iteration" CHANGELOG.md | head -n 1 | grep -o "Iteration [0-9.]*" | awk '{print $2}')
          if ! grep -q "Iteration $VERSION" README.md; then
            echo "❌ Error: README.md version ($VERSION) does not match CHANGELOG.md!"
            exit 1
          fi
          echo "✅ Documentation Check Passed!"

  backtest:
    needs: doc_check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 強制鎖定關鍵版本，避免環境漂移
          pip install pandas numpy joblib ccxt scikit-learn==1.7.2
          # 如果有 requirements.txt 就跑這行
          [ -f requirements.txt ] && pip install -r requirements.txt || echo "No requirements.txt"
      - name: Run Backtest
        run: |
          # 確保路徑正確
          export PYTHONPATH=$PYTHONPATH:.
          python scripts/backtest.py
          echo "📊 Backtest Results JSON Output:"
          cat results.json
      - name: Validate Strategy Gate
        run: |
          python -c "
          import json, sys
          try:
              with open('results.json') as f:
                  res = json.load(f)
              win_rate = res.get('win_rate', 0)
              # 處理百分比與小數點的一致性，假設回測輸出是 0.66 而非 66
              wr_val = win_rate * 100 if win_rate < 1 else win_rate
              pf = res.get('profit_factor', 0)
              print(f'\nAdjusted Win Rate: {wr_val}%, Profit Factor: {pf}')
              if wr_val < 60 or pf < 1.8:
                  sys.exit(1)
          except Exception as e:
              print(f'Error: {e}')
              sys.exit(1)
          "