
name: Deploy to GCE

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 16 * * *' # 16:00 UTC is 00:00 Taipei Time (UTC+8)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/ai_crypto_strategy
            git pull origin main
            # 使用 GitHub Secrets 建立 .env 檔案
            echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" > .env
            echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
            pip3 install -r requirements.txt
            
            if [ "${{ github.event_name }}" == "schedule" ]; then
              echo "Running daily summary..."
              export PYTHONPATH=$PYTHONPATH:.
              python3 -m src.summary
            else
              echo "Deploying market monitor..."
              sudo apt-get install at -y || true
              # 使用 python3 -u 確保輸出不被緩衝，並使用 nohup 確保進程持續運行
              echo "cd ~/ai_crypto_strategy && export PYTHONPATH=\$PYTHONPATH:. && pkill -f src.market || true && nohup python3 -u -m src.market > market.log 2>&1 &" | at now
              sleep 2
            fi
            exit 0