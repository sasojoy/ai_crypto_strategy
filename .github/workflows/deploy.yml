name: Deploy to GCE v1.3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/ai_crypto_strategy
            
            echo "=== 診斷 GCE 狀態 ==="
            df -h | grep '^/'
            ps aux | grep python | grep -v grep || echo "No python process running"
            
            echo "=== 強制同步代碼 ==="
            git fetch --all && git reset --hard origin/main

            printf "TELEGRAM_BOT_TOKEN=%s\n" "${{ secrets.TELEGRAM_BOT_TOKEN }}" > .env
            printf "TELEGRAM_CHAT_ID=%s\n" "${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
            printf "GEMINI_API_KEY=%s\n" "${{ secrets.GEMINI_API_KEY }}" >> .env

            pip3 install -r requirements.txt

            echo "=== 部署 Market Monitor ==="
            PID=$(pgrep -f "src.market" | grep -v $$ || true)
            if [ ! -z "$PID" ]; then
              echo "Killing existing processes: $PID"
              kill -15 $PID || kill -9 $PID
            fi

            export PYTHONPATH=$PYTHONPATH:.
            nohup python3 -u -m src.market > market.log 2>&1 & 
            
            sleep 5
            echo "--- Market Log (Last 20 lines) ---"
            tail -n 20 market.log

            echo "=== 驗證進程 ==="
            sleep 10
            if ps aux | grep -v grep | grep "src.market" > /dev/null; then
              echo "✅ Market monitor is running successfully."
            else
              echo "❌ Market monitor failed to start."
              cat market.log
              exit 1
            fi
