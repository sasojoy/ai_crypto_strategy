name: Deploy to GCE

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 16 * * *' # 16:00 UTC is 00:00 Taipei Time (UTC+8)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ~/ai_crypto_strategy
            git fetch --all && git reset --hard origin/main

            printf "TELEGRAM_BOT_TOKEN=%s\n" "${{ secrets.TELEGRAM_BOT_TOKEN }}" > .env
            printf "TELEGRAM_CHAT_ID=%s\n" "${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
            printf "GEMINI_API_KEY=%s\n" "${{ secrets.GEMINI_API_KEY }}" >> .env

            # 1. Ensure Node.js and NPM are installed
            if ! command -v npm &> /dev/null; then
              echo "NPM not found. Attempting installation..."
              sudo apt-get update && sudo apt-get install -y nodejs npm
            fi

            # 2. Local NPM Setup
            mkdir -p ~/.npm-global
            npm config set prefix '~/.npm-global'
            export PATH=$HOME/.npm-global/bin:$PATH

            # 3. Install PM2 locally if not present
            if [ ! -f "$HOME/.npm-global/bin/pm2" ]; then
              echo "Installing PM2..."
              npm install -g pm2
            fi

            PM2_BIN="$HOME/.npm-global/bin/pm2"

            pip3 install -r requirements.txt

            if [ "${{ github.event_name }}" == "schedule" ]; then
              echo "Running daily summary..."
              export PYTHONPATH=$PYTHONPATH:.
              python3 -m src.summary
            else
              echo "Deploying market monitor with PM2..."
              export PYTHONPATH=$PYTHONPATH:.

              # 4. PM2 Deployment Logic
              $PM2_BIN delete Iteration15_Bot || true
              $PM2_BIN delete Iteration20_Bot || true
              $PM2_BIN delete Iteration23_Pro_Alpha || true
              $PM2_BIN restart Iteration24_Pro_Alpha || $PM2_BIN start "python3 -u -m src.market" --name "Iteration24_Pro_Alpha"
              $PM2_BIN save

              echo "✅ PM2 Status Verification:"
              $PM2_BIN list

              echo "🔍 Process Verification:"
              ps aux | grep "src.market" | grep -v grep
            fi
