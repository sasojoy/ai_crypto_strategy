
name: Deploy to GCE

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 16 * * *' # 16:00 UTC is 00:00 Taipei Time (UTC+8)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/ai_crypto_strategy
            git pull origin main
            # 確保 .env 存在 (如果有的話)
            [ -f ~/.env ] && cp ~/.env .env || echo ".env not found in home directory"
            pip3 install -r requirements.txt
            
            if [ "${{ github.event_name }}" == "schedule" ]; then
              echo "Running daily summary..."
              export PYTHONPATH=$PYTHONPATH:.
              python3 -m src.summary
            else
              echo "Deploying market monitor..."
              sudo apt-get install at -y || true
              echo "cd ~/ai_crypto_strategy && export PYTHONPATH=\$PYTHONPATH:. && pkill -f src.market || true && python3 -m src.market > market.log 2>&1" | at now
              sleep 2
            fi
            exit 0