name: Deploy to GCE

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 16 * * *' # 16:00 UTC is 00:00 Taipei Time (UTC+8)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: GITHUB_TOKEN,GITHUB_REPOSITORY
          script: |
            cd ~/ai_crypto_strategy
            git fetch --all && git reset --hard origin/main

            printf "TELEGRAM_BOT_TOKEN=%s\n" "${{ secrets.TELEGRAM_BOT_TOKEN }}" > .env
            printf "TELEGRAM_CHAT_ID=%s\n" "${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
            printf "GEMINI_API_KEY=%s\n" "${{ secrets.GEMINI_API_KEY }}" >> .env

            pip3 install -r requirements.txt

            # Local NPM Setup (No sudo required)
            mkdir -p ~/.npm-global
            npm config set prefix '~/.npm-global'
            export PATH=$PATH:$HOME/.npm-global/bin

            # Install PM2 locally
            npm install -g pm2

            if [ "${{ github.event_name }}" == "schedule" ]; then
              echo "Running daily summary..."
              export PYTHONPATH=$PYTHONPATH:.
              python3 -m src.summary
            else
              echo "Deploying market monitor with PM2..."
              export PYTHONPATH=$PYTHONPATH:.

              # PM2 Deployment Logic with explicit path and PYTHONPATH
              $HOME/.npm-global/bin/pm2 restart Iteration15_Bot || $HOME/.npm-global/bin/pm2 start "python3 -u -m src.market" --name "Iteration15_Bot"
              $HOME/.npm-global/bin/pm2 save

              echo "✅ PM2 Status Verification:"
              $HOME/.npm-global/bin/pm2 list
            fi
            exit 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
