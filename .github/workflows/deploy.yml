name: Deploy to GCE Final

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/ai_crypto_strategy
            echo "=== 1. 同步代碼 ==="
            git fetch --all && git reset --hard origin/main
            
            echo "=== 2. 配置環境變數 ==="
            printf "TELEGRAM_BOT_TOKEN=%s\n" "${{ secrets.TELEGRAM_BOT_TOKEN }}" > .env
            printf "TELEGRAM_CHAT_ID=%s\n" "${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
            printf "GEMINI_API_KEY=%s\n" "${{ secrets.GEMINI_API_KEY }}" >> .env
            
            pip3 install -r requirements.txt
            export PYTHONPATH=$PYTHONPATH:.
            
            if [ "${{ github.event_name }}" == "schedule" ]; then
              echo "執行定時任務..."
              python3 -m src.summary
            else
              echo "=== 3. 部署 Market Monitor ==="
              PID=$(pgrep -f "src.market" | grep -v $$ || true)
              if [ ! -z "$PID" ]; then
                echo "關閉舊進程: $PID"
                kill -15 $PID || kill -9 $PID
              fi
              
              nohup python3 -u -m src.market > market.log 2>&1 &
              
              sleep 5
              echo "--- 啟動日誌 ---"
              tail -n 20 market.log
              
              echo "=== 4. 更新 Crontab ==="
              (crontab -l 2>/dev/null | grep -v "src.market" ; cat .github/crontab_template.txt) | crontab -
              
              echo "=== 5. 驗證 ==="
              sleep 10
              if ps aux | grep -v grep | grep "src.market" > /dev/null; then
                echo "✅ 部署成功"
              else
                echo "❌ 部署失敗"
                cat market.log
                exit 1
              fi
              
              python3 src/report.py || echo "Report skipped"
            fi
