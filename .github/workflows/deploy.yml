name: Deploy to GCE

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 16 * * *' # 16:00 UTC is 00:00 Taipei Time (UTC+8)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          # 傳遞 GITHUB_TOKEN 給 SSH 腳本環境
          envs: GITHUB_TOKEN,GITHUB_REPOSITORY
          script: |
            cd ~/ai_crypto_strategy
            git fetch --all && git reset --hard origin/main
            
            printf "TELEGRAM_BOT_TOKEN=%s\n" "${{ secrets.TELEGRAM_BOT_TOKEN }}" > .env
            printf "TELEGRAM_CHAT_ID=%s\n" "${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
            printf "GEMINI_API_KEY=%s\n" "${{ secrets.GEMINI_API_KEY }}" >> .env
            
            pip3 install -r requirements.txt
            
            if [ "${{ github.event_name }}" == "schedule" ]; then
              echo "Running daily summary..."
              export PYTHONPATH=$PYTHONPATH:.
              python3 -m src.summary
            else
              echo "Deploying market monitor..."
              pkill -9 -f "python3 -u -m src.market" || true
              
              export PYTHONPATH=$PYTHONPATH:.
              nohup python3 -u -m src.market > market.log 2>&1 &
              
              sleep 5
              echo "--- Market Log (Last 20 lines) ---"
              tail -n 20 market.log
              
              echo "Updating crontab..."
              (crontab -l 2>/dev/null | grep -v "src.market" ; cat .github/crontab_template.txt) | crontab -
              
              echo "Verifying process..."
              sleep 10
              if ps aux | grep -v grep | grep "src.market" > /dev/null; then
                echo "✅ Market monitor is running successfully."
              else
                echo "❌ Market monitor failed to start."
                tail -n 50 market.log
                exit 1
              fi
              
              echo "Generating strategy report..."
              export PYTHONPATH=$PYTHONPATH:.
              # 確保環境變數在 Python 執行時可用
              export GITHUB_TOKEN=$GITHUB_TOKEN
              export GITHUB_REPOSITORY=$GITHUB_REPOSITORY
              python3 src/report.py || echo "Report generation skipped"
            fi
            exit 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
