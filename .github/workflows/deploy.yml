
name: Deploy to GCE

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/ai_crypto_strategy
            git pull origin main
            # 確保 .env 存在 (如果有的話)
            [ -f ~/.env ] && cp ~/.env .env || echo ".env not found in home directory"
            pip3 install -r requirements.txt
            
            # 1. 殺掉舊進程 (確保乾淨重啟)
            pkill -f src.market || true
            
            # 2. 設定路徑並啟動 (使用 nohup + setsid 雙保險)
            export PYTHONPATH=$PYTHONPATH:.
            setsid nohup python3 -m src.market > market.log 2>&1 &
            
            # 3. 關鍵：給予緩衝時間並主動回報成功
            sleep 5
            if ps aux | grep -v grep | grep "src.market"; then
              echo "✅ Deployment Successful!"
              exit 0
            else
              echo "❌ Deployment Failed!"
              exit 1
            fi