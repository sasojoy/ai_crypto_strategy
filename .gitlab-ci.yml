
stages:
  - setup
  - validate
  - deploy

environment_setup:
  stage: setup
  image: python:3.10
  script:
    - chmod +x setup_env.sh
    - ./setup_env.sh
  only:
    - main

validate_strategy:
  stage: validate
  image: python:3.10
  before_script:
    - python --version
    - pip install pandas numpy joblib ccxt scikit-learn==1.7.2
    - pip list
  script:
    - python scripts/backtest.py
    - echo "📊 Backtest Results JSON Output:"
    - cat results.json
    - |
      python -c "
      import json, sys
      with open('results.json') as f:
          res = json.load(f)
      print(f'\nWin Rate: {res.get(\"win_rate\", 0)}%, Profit Factor: {res.get(\"profit_factor\", 0)}')
      if res.get('win_rate', 0) < 60 or res.get('profit_factor', 0) < 1.8:
          print('❌ Strategy Gate Failed: Win Rate < 60% or Profit Factor < 1.8')
          sys.exit(1)
      print('✅ Strategy Gate Passed!')
      "
  only:
    - main

deploy_to_gce:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - ssh $GCE_USER@$GCE_IP "cd /home/$GCE_USER/ai_crypto_strategy && git fetch origin main && git reset --hard origin/main && chmod +x setup_env.sh && ./setup_env.sh && pm2 restart all"
  only:
    - main
